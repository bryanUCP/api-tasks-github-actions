name: Continuous Integration
on: 
    push:
        branches: ["main"]

permissions:
    id-token: write
    contents: read
  
env:
    DOTNET_VERSION: '10.0.102'
    BUILD_CONFIGURATION: 'Release'
jobs:
    build:
       name: "CI"
       runs-on: ubuntu-latest
       steps:
          - name: Checkout Repository
            uses: actions/checkout@v4
          - name: Setup up .NET
            uses: Actions/setup-dotnet@v4
            with:
                dotnet-version: ${{env.DOTNET_VERSION}}

          - name: Test
            run: dotnet test --configuration ${{env.BUILD_CONFIGURATION}}

          - name: Dotnet Publish
            run: dotnet publish src/TaskApi.csproj --configuration ${{env.BUILD_CONFIGURATION}} -o artifacts

          - name: Upload Artifacts
            uses: actions/upload-artifact@v4
            with:
                name: uv-artifact
                path: artifacts/

    deploy_dev:
        name: Deploy Dev
        runs-on: ubuntu-latest

        needs: build

        steps:
          - name: Download Artifacts
            uses: actions/download-artifact@v4
            with:
                name: uv-artifact
                path: artifacts/

          - name: Azure Login
            uses: Azure/login@v1
            with:
              client-id: ${{secrets.AZURE_CLIENT_ID}}
              tenant-id: ${{secrets.AZURE_TENANT_ID}}
              susbcription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}

          - name: Deploy to Azure Web App
            uses: azure/webapps-deploy@v2
            with:
              app-name: 'app-api-uv-dev-bryan'
              package: artifacts/
